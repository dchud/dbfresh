name: Deploy docs

# Publishes the mkdocs-material site to GitHub Pages on merge to main.
# One-time maintainer step: Settings -> Pages -> Source: "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/dbfresh/**" # the reference pages are generated from the code
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least privilege at the workflow level; the pages/id-token writes the deploy
# needs are scoped to that job below (zizmor excessive-permissions).
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2
        with:
          tool: just

      - name: Sync dependencies (with docs group)
        run: uv sync --group docs

      - name: Generate reference pages and build the site (--strict)
        run: just docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
